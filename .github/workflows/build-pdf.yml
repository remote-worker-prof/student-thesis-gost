name: Build PDF

# CI запускается на push/PR и вручную.
on:
  push:
    branches: ["master", "main"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    # Сборка и проверки выполняются в Linux-окружении GitHub Actions.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Проверяем стиль исходников до тяжелой TeX-сборки.
      - name: TeX source style checks (hard-fail)
        run: |
          ./scripts/check_tex_style.sh
          ./scripts/check_intro_structure.sh

      # Собираем оба варианта ВКР (бакалавр и специалитет).
      - name: Compile PDFs (bachelor + specialist)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: |
            main-bachelor.tex
            main-specialist.tex
          latexmk_use_lualatex: true
          extra_system_packages: "biber make"

      # poppler-utils нужен для pdffonts/pdftotext в проверочных скриптах.
      - name: Install check dependencies
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      # Проверка шрифтов и структуры итоговых PDF.
      - name: Run PDF checks
        run: |
          ./scripts/check_fonts.sh build/main-bachelor.pdf
          ./scripts/check_fonts.sh build/main-specialist.pdf
          ./scripts/check_structure.sh build/main-bachelor.pdf
          ./scripts/check_structure.sh build/main-specialist.pdf

      # Публикуем PDF как артефакты CI для скачивания.
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: thesis-pdfs
          path: |
            build/main-bachelor.pdf
            build/main-specialist.pdf
