defaultIndent: "  "
indentPreamble: 0

removeTrailingWhitespace:
  beforeProcessing: 0
  afterProcessing: 1

verbatimEnvironments:
  verbatim: 1
  lstlisting: 1
  minted: 1

verbatimCommands:
  verb: 1
  lstinline: 1

modifyLineBreaks:
  preserveBlankLines: 1
  condenseMultipleBlankLinesInto: 1
  textWrapOptions:
    columns: 80
    when: after
    multipleSpacesToSingle: 1
    removeBlockLineBreaks: 1
    comments:
      wrap: 0
      inheritLeadingSpace: 0
    blocksFollow:
      headings: 1
      commentOnPreviousLine: 1
      par: 1
      blankLine: 1
      verbatim: 1
      filecontents: 1
      other: \\\]|\\item(?:\h|\[)
    blocksBeginWith:
      A-Z: 1
      a-z: 1
      0-9: 0
      other: '[А-Яа-яЁё]'
    blocksEndBefore:
      commentOnOwnLine: 1
      verbatim: 1
      filecontents: 1
      other: \\begin\{|\\\[|\\end\{
    huge: overflow
    separator: ""
